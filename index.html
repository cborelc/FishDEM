<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>p5.js — Fisheye camera in DEM viewer</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <script src="vendor/geotiff.js"></script>
  </head>
  <body>
    <main id="app">
      <div class="hud">
        <div class="title">Fisheye camera in DEM viewer</div>
        <div class="controls">
          <div class="control-row">
            <label class="file-button">
              Import DEM
              <input id="fileInput" type="file" accept=".tif,.tiff,.png,.jpg,.jpeg,.bmp" />
            </label>
            <label class="slider">
              DEM scale
              <input id="demScale" type="range" min="0.1" max="4" value="1" step="0.1" />
              <span id="demScaleValue" class="slider-value">1.0</span>
            </label>
          </div>
          <div class="control-row">
            <label class="slider">
              Camera Z (m)
              <input id="cameraZ" type="range" min="0" max="200" value="0" step="1" />
              <span id="cameraZValue" class="slider-value">0.0</span>
            </label>
          </div>
          <div class="control-row">
            <div class="descriptor">Shading</div>
            <div class="toggle-group" role="group" aria-label="View mode">
              <button class="toggle is-active" data-mode="dem" type="button">DEM</button>
              <button class="toggle" data-mode="shade" type="button">Hillshade</button>
            </div>
          </div>
          <div class="control-row">
            <div class="descriptor">Fisheye shading</div>
            <div class="toggle-group" role="group" aria-label="Fisheye shading">
              <button class="toggle" data-fisheye="white" type="button">White</button>
              <button class="toggle is-active" data-fisheye="dem" type="button">DEM</button>
              <button class="toggle" data-fisheye="shade" type="button">Hillshade</button>
            </div>
          </div>
          <div class="control-row">
            <div class="descriptor">Fisheye resolution</div>
            <div class="toggle-group" role="group" aria-label="Fisheye size">
              <button class="toggle" data-fisheye-size="128" type="button">128</button>
              <button class="toggle" data-fisheye-size="256" type="button">256</button>
              <button class="toggle" data-fisheye-size="512" type="button">512</button>
              <button class="toggle is-active" data-fisheye-size="720" type="button">720</button>
            </div>
          </div>
        </div>
        <div class="hint">Middle mouse drag = pan • Wheel = zoom</div>
      </div>
      <div id="equiControl" class="equi-control">
        <label class="slider">
          Azimuth bins
          <input id="equiBins" type="range" min="36" max="720" value="360" step="1" />
          <span id="equiBinsValue" class="slider-value">360</span>
        </label>
      </div>
    </main>
    <script src="sketch.js"></script>
  </body>
</html>
